name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Flet
        run: pip install flet==0.21.2

      - name: Build APK
        run: |
          flutter doctor
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: todo-apk
          path: build/apk/*.apk