name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet==0.24.1

      - name: Build APK
        run: flet build apk --no-rich-output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: todo-apk
          path: build/apk/*.apk